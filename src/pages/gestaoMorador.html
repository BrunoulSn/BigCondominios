<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestão de Moradores - BigCondomínios</title>
  <link rel="stylesheet" href="/public/styles/gestaoMoradorStyle.css"/>
  <link rel="stylesheet" href="/public/styles/mainStyle.css">
</head>

<body>
  <main class="content">

        <header id="navbar"></header>
    
    <script>
        fetch('/src/pages/navbar.html')
            .then(response => response.text())
            .then(data => document.getElementById('navbar').innerHTML = data);
    </script>

    <!-- Seção de Gestão de Moradores -->
    <section class="secaoMoradores">
      <h2>Cadastrar Morador</h2>
      <div class="formMorador">
        <input type="text" id="nomeMorador" placeholder="Nome completo" />
        <input type="text" id="cpfMorador" placeholder="CPF" />
        <input type="text" id="blocoMorador" placeholder="Bloco" />
        <input type="text" id="apartamentoMorador" placeholder="Apartamento" />
        <button onclick="cadastrarMorador()">Cadastrar</button>
      </div>

      <h2>Moradores Cadastrados</h2>
      <table class="tabelaMoradores">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>CPF</th>
            <th>Bloco</th>
            <th>Apartamento</th>
          </tr>
        </thead>
        <tbody id="corpoTabelaMoradores">
          <!-- Conteúdo preenchido via JS -->
        </tbody>
      </table>
    </section>
  </main>
  <script src="/BigCondominios-frontend/src/gestaoMoradores.js"></script>
</body>

</html>
